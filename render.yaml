# render.yaml — Deploy backend (FastAPI) on Render free tier
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: study-companion-api
    runtime: python
    buildCommand: |
      pip install uv
      uv python install 3.11.14
      uv sync
      uv pip install openai-whisper==20231117 --no-build-isolation
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: BACKEND_URL
        value: https://study-companion-api.onrender.com
    disk:
      name: data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
